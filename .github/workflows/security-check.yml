name: Security Check
on:
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 3 * * 1'  # Monday 3h UTC
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: false

jobs:
  security:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Setup Python 3.11
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('scripts/requirements.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-

      - name: Install requirements
        run: |
          pip install -r scripts/requirements.txt
          pip install vt-py

      - name: Get changed plugins (PR)
        if: github.event_name == 'pull_request'
        id: changed-plugins
        run: |
          changed_files=$(git diff --name-only origin/main...HEAD -- 'data/plugins/*.json' 'data/new-plugins.json')
          if [ -n "$changed_files" ]; then
            echo "plugins<<EOF" >> $GITHUB_OUTPUT
            echo "$changed_files" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "plugins=" >> $GITHUB_OUTPUT
          fi

      - name: Get all plugins (schedule)
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        id: all-plugins
        run: |
          if [ -f data/catalog.json ]; then
            echo "plugins=data/catalog.json" >> $GITHUB_OUTPUT
          else
            echo "plugins=" >> $GITHUB_OUTPUT
          fi

      - name: Run security scanner
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VT_API_KEY: ${{ secrets.VT_API_KEY }}
        run: |
          mkdir -p data/security-reports

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            if [ -n "${{ steps.changed-plugins.outputs.plugins }}" ]; then
              python scripts/security-scanner.py --files "${{ steps.changed-plugins.outputs.plugins }}"
            fi
          else
            python scripts/security-scanner.py --all
          fi

      - name: Upload security reports
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: security-reports-${{ github.run_number }}
          path: data/security-reports/
          retention-days: 30

      - name: Generate security summary and check for DANGER
        id: summary
        run: |
          python3 -c "
          import json, glob, sys, os

          reports = glob.glob('data/security-reports/*.json')
          if not reports:
              with open(os.environ['GITHUB_STEP_SUMMARY'], 'a') as f:
                  f.write('## Security Check Results\n\nNo plugins to scan.\n')
              with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                  f.write('has_danger=false\n')
                  f.write('comment=No plugins to scan.\n')
              sys.exit(0)

          rows = []
          danger_plugins = []
          total_issues = 0

          for r in sorted(reports):
              with open(r) as f:
                  data = json.load(f)
              name = data.get('name', os.path.basename(r).replace('.json', ''))
              score = data.get('score', data.get('security_score', 'N/A'))
              issues = data.get('issues', [])
              issue_count = len(issues)
              total_issues += issue_count
              level = data.get('level', data.get('risk_level', 'OK'))

              if str(level).upper() == 'DANGER':
                  danger_plugins.append(name)
                  status = 'DANGER'
              elif issue_count > 0:
                  status = 'WARNING'
              else:
                  status = 'OK'

              rows.append(f'| {name} | {score} | {issue_count} | {status} |')

          # Write step summary
          with open(os.environ['GITHUB_STEP_SUMMARY'], 'a') as f:
              f.write('## Security Check Results\n\n')
              f.write(f'**Plugins scanned:** {len(reports)}  \n')
              f.write(f'**Total issues:** {total_issues}  \n')
              if danger_plugins:
                  f.write(f'**DANGER plugins:** {', '.join(danger_plugins)}  \n')
              f.write('\n')
              f.write('| Plugin | Score | Issues | Status |\n')
              f.write('|--------|-------|--------|--------|\n')
              for row in rows:
                  f.write(row + '\n')

          # Write outputs
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              if danger_plugins:
                  f.write('has_danger=true\n')
              else:
                  f.write('has_danger=false\n')

          # Build PR comment
          lines = ['| Plugin | Score | Issues | Status |', '|--------|-------|--------|--------|']
          lines.extend(rows)
          comment = '\n'.join(lines)
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f'comment<<EOF\n{comment}\nEOF\n')
          "

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const comment = `${{ steps.summary.outputs.comment }}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## Security Check Results\n\n${comment}`
            });

      - name: Fail if DANGER plugins found
        if: steps.summary.outputs.has_danger == 'true'
        run: |
          echo "::error::DANGER-level plugins detected. Review security reports before merging."
          exit 1
