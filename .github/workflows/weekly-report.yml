name: Weekly Report
on:
  schedule:
    - cron: '0 9 * * 1'  # Monday 9h UTC
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: read
  issues: write

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Setup Python 3.11
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.11'

      - name: Generate weekly report
        id: report
        run: |
          report=$(python3 -c "
          import json, os, glob
          from datetime import datetime, timedelta

          now = datetime.utcnow()
          week_ago = now - timedelta(days=7)
          date_str = now.strftime('%Y-%m-%d')

          # Load catalog
          total = 0
          categories = {}
          plugins = []
          if os.path.exists('data/catalog.json'):
              with open('data/catalog.json') as f:
                  data = json.load(f)
              plugins = data if isinstance(data, list) else data.get('plugins', [])
              total = len(plugins)
              for p in plugins:
                  cat = p.get('category', 'uncategorized')
                  if isinstance(cat, list):
                      for c in cat:
                          categories[c] = categories.get(c, 0) + 1
                  else:
                      categories[cat] = categories.get(cat, 0) + 1

          # Count new plugins this week (by date_added field if available)
          new_this_week = 0
          new_names = []
          for p in plugins:
              added = p.get('date_added', p.get('added_at', ''))
              if added:
                  try:
                      added_date = datetime.fromisoformat(added.replace('Z', '+00:00')).replace(tzinfo=None)
                      if added_date >= week_ago:
                          new_this_week += 1
                          new_names.append(p.get('name', 'Unknown'))
                  except (ValueError, TypeError):
                      pass

          # Security reports
          sec_reports = glob.glob('data/security-reports/*.json')
          danger_count = 0
          warning_count = 0
          ok_count = 0
          for r in sec_reports:
              try:
                  with open(r) as f:
                      rd = json.load(f)
                  level = str(rd.get('level', rd.get('risk_level', 'OK'))).upper()
                  if level == 'DANGER':
                      danger_count += 1
                  elif level == 'WARNING' or rd.get('issues', []):
                      warning_count += 1
                  else:
                      ok_count += 1
              except Exception:
                  pass

          # Build report
          lines = []
          lines.append(f'# PlugVault Weekly Report — {date_str}')
          lines.append('')
          lines.append('## Overview')
          lines.append('')
          lines.append(f'| Metric | Value |')
          lines.append(f'|--------|-------|')
          lines.append(f'| Total plugins in catalog | {total} |')
          lines.append(f'| New plugins this week | {new_this_week} |')
          lines.append(f'| Categories | {len(categories)} |')
          lines.append(f'| Security reports available | {len(sec_reports)} |')
          lines.append('')

          if new_names:
              lines.append('## New Plugins This Week')
              lines.append('')
              for name in new_names:
                  lines.append(f'- {name}')
              lines.append('')

          if categories:
              lines.append('## Category Distribution')
              lines.append('')
              lines.append('| Category | Count |')
              lines.append('|----------|-------|')
              for cat, count in sorted(categories.items(), key=lambda x: -x[1]):
                  lines.append(f'| {cat} | {count} |')
              lines.append('')

          if sec_reports:
              lines.append('## Security Distribution')
              lines.append('')
              lines.append(f'| Status | Count |')
              lines.append(f'|--------|-------|')
              lines.append(f'| OK | {ok_count} |')
              lines.append(f'| WARNING | {warning_count} |')
              lines.append(f'| DANGER | {danger_count} |')
              lines.append('')

          print('\n'.join(lines))
          ")

          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$report" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Issue with report
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const today = new Date().toISOString().split('T')[0];
            const body = `${{ steps.report.outputs.body }}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Weekly Report — ${today}`,
              body: body,
              labels: ['weekly-report']
            });

      - name: Job Summary
        run: |
          echo "${{ steps.report.outputs.body }}" >> $GITHUB_STEP_SUMMARY
