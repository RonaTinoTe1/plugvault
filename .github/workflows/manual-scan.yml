name: Manual Plugin Scan
on:
  workflow_dispatch:
    inputs:
      plugin_url:
        description: 'GitHub URL of a plugin to add manually (e.g. https://github.com/user/repo)'
        required: false
        type: string
      search_query:
        description: 'Custom GitHub search query (e.g. "claude plugin" language:python)'
        required: false
        type: string
      force_security_scan:
        description: 'Force a security scan on discovered plugins'
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  manual-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Validate inputs
        run: |
          if [ -z "${{ inputs.plugin_url }}" ] && [ -z "${{ inputs.search_query }}" ]; then
            echo "::error::At least one of 'plugin_url' or 'search_query' must be provided."
            exit 1
          fi

      - name: Checkout repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Python 3.11
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('scripts/requirements.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-

      - name: Install requirements
        run: |
          pip install -r scripts/requirements.txt
          pip install vt-py

      - name: Scan specific plugin URL
        if: inputs.plugin_url != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Scanning plugin: ${{ inputs.plugin_url }}"
          python scripts/scan-github.py --url "${{ inputs.plugin_url }}"

      - name: Run custom search query
        if: inputs.search_query != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Running custom search: ${{ inputs.search_query }}"
          python scripts/scan-github.py --query "${{ inputs.search_query }}"

      - name: Run security scan
        if: inputs.force_security_scan == true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VT_API_KEY: ${{ secrets.VT_API_KEY }}
        run: |
          mkdir -p data/security-reports
          if [ -f data/new-plugins.json ]; then
            python scripts/security-scanner.py --files "data/new-plugins.json"
          else
            echo "No new-plugins.json found, skipping security scan."
          fi

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: manual-scan-${{ github.run_number }}
          path: |
            data/new-plugins.json
            data/security-reports/
          retention-days: 30
          if-no-files-found: ignore

      - name: Check results
        id: results
        run: |
          if [ -f data/new-plugins.json ]; then
            count=$(python3 -c "import json; data=json.load(open('data/new-plugins.json')); print(len(data) if isinstance(data,list) else len(data.get('plugins',[])))")
            echo "count=$count" >> $GITHUB_OUTPUT
          else
            echo "count=0" >> $GITHUB_OUTPUT
          fi

      - name: Create PR if plugins found
        if: steps.results.outputs.count > 0
        uses: peter-evans/create-pull-request@271a8d0340265f705b14b6f23e58c17d186e1a01 # v5.0.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: manual scan - add ${{ steps.results.outputs.count }} plugins"
          title: "chore: manual scan - ${{ steps.results.outputs.count }} plugins found"
          body: |
            ## Manual Plugin Scan Results

            **Triggered by:** @${{ github.actor }}
            **Plugin URL:** ${{ inputs.plugin_url || 'N/A' }}
            **Search query:** ${{ inputs.search_query || 'N/A' }}
            **Security scan:** ${{ inputs.force_security_scan }}
            **Plugins found:** ${{ steps.results.outputs.count }}

            Please review `data/new-plugins.json` before merging.
          branch: manual-scan/${{ github.run_number }}
          labels: manual-scan
          delete-branch: true

      - name: Job Summary
        run: |
          echo "## Manual Plugin Scan" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Input | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Plugin URL | ${{ inputs.plugin_url || 'N/A' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Search query | ${{ inputs.search_query || 'N/A' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security scan | ${{ inputs.force_security_scan }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Plugins found:** ${{ steps.results.outputs.count }}" >> $GITHUB_STEP_SUMMARY
