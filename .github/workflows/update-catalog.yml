name: Update Catalog
on:
  schedule:
    - cron: '0 8 * * 1'  # Monday 8h UTC
  push:
    branches: [main]
    paths:
      - 'data/new-plugins.json'
      - 'data/security-reports/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python 3.11
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('scripts/requirements.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-

      - name: Install requirements
        run: pip install -r scripts/requirements.txt

      - name: Snapshot catalog before build
        id: before
        run: |
          if [ -f data/catalog.json ]; then
            count_before=$(python3 -c "import json; data=json.load(open('data/catalog.json')); plugins=data if isinstance(data,list) else data.get('plugins',[]); print(len(plugins))")
          else
            count_before=0
          fi
          echo "count=$count_before" >> $GITHUB_OUTPUT

      - name: Build catalog
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/build-catalog.py

      - name: Build API
        run: python scripts/build-api.py --catalog catalog.json --output-dir api/v1/

      - name: Commit API files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add api/
          git diff --staged --quiet || git commit -m "build: update API ($(date -u '+%Y-%m-%d %H:%M UTC'))"

      - name: Catalog stats after build
        id: after
        run: |
          if [ -f data/catalog.json ]; then
            stats=$(python3 -c "
          import json
          with open('data/catalog.json') as f:
              data = json.load(f)
          plugins = data if isinstance(data, list) else data.get('plugins', [])
          total = len(plugins)
          cats = set()
          for p in plugins:
              c = p.get('category', 'uncategorized')
              if isinstance(c, list):
                  cats.update(c)
              else:
                  cats.add(c)
          print(f'{total}|{len(cats)}')
          ")
            total=$(echo "$stats" | cut -d'|' -f1)
            categories=$(echo "$stats" | cut -d'|' -f2)
          else
            total=0
            categories=0
          fi
          before=${{ steps.before.outputs.count }}
          added=$((total - before))
          echo "total=$total" >> $GITHUB_OUTPUT
          echo "categories=$categories" >> $GITHUB_OUTPUT
          echo "added=$added" >> $GITHUB_OUTPUT

      - name: Check for changes
        id: check-changes
        run: |
          git diff --quiet data/catalog.json || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push catalog
        if: steps.check-changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/catalog.json
          added=${{ steps.after.outputs.added }}
          total=${{ steps.after.outputs.total }}
          if [ "$added" -gt 0 ]; then
            git commit -m "build: update catalog ($total plugins, +$added new)"
          else
            git commit -m "build: update catalog ($total plugins)"
          fi
          git push

      - name: Job Summary
        run: |
          echo "## Catalog Update" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Total plugins | ${{ steps.after.outputs.total }} |" >> $GITHUB_STEP_SUMMARY
          echo "| New plugins added | ${{ steps.after.outputs.added }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Categories | ${{ steps.after.outputs.categories }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Previous count | ${{ steps.before.outputs.count }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.check-changes.outputs.changed }}" = "true" ]; then
            echo "Catalog was updated and pushed." >> $GITHUB_STEP_SUMMARY
          else
            echo "No changes detected. Catalog is up to date." >> $GITHUB_STEP_SUMMARY
          fi
